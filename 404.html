<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - SRE Notes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/doc.css">
  <link rel="stylesheet" href="css/content.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" data-sidebar></aside>
    <main class="main">
      <header class="topbar">
        <div class="topbar-breadcrumb">
          <span class="prompt">~</span><span class="sep">/</span>
          <span class="current">404</span>
        </div>
        <div class="topbar-actions">
          <button class="topbar-btn" data-theme-toggle aria-label="Toggle theme">
            <svg data-theme-icon="dark" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            <svg data-theme-icon="light" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
          </button>
        </div>
      </header>
      <div class="content-scroll">
        <div class="page" style="text-align: center; padding: 120px 40px;">
          <div style="font-family: var(--font-mono); font-size: 96px; font-weight: 700; color: var(--accent); line-height: 1; margin-bottom: 16px;">404</div>
          <h1 style="font-size: 28px; margin: 0 0 12px;">页面未找到</h1>
          <p style="color: var(--text-secondary); margin: 0 auto 32px; max-width: 480px;">你访问的页面不存在、已被移动，或链接拼写有误。</p>
          <a href="/" style="display: inline-flex; align-items: center; gap: 8px; padding: 10px 20px; background: var(--accent); color: var(--accent-text); border-radius: var(--radius-md); text-decoration: none; font-weight: 500;">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M12 5l-7 7 7 7"/></svg>
            返回首页
          </a>
        </div>
      </div>
    </main>
  </div>
  <script src="js/data.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/sidebar.js"></script>
</body>
</html>
