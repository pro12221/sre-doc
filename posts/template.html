<!-- Mobile TOC -->
<button class="toc-mobile-btn" id="toc-mobile-btn" onclick="toggleMobileToc()">☰</button>
<div class="toc-mobile-panel" id="toc-mobile-panel">
  <div class="toc-title">目录</div>
  <ul class="toc-list" id="toc-mobile-list"></ul>
</div>

<script>
function toggleMobileToc() {
  document.getElementById('toc-mobile-panel').classList.toggle('show');
}

(function() {
  var content = document.querySelector('.article-content');
  if (!content) return;
  var headings = content.querySelectorAll('h2, h3');
  var tocList = document.getElementById('toc-list');
  var tocMobileList = document.getElementById('toc-mobile-list');
  if (!tocList || headings.length === 0) return;

  var counter = 0;
  headings.forEach(function(h) {
    counter++;
    var slug = 'section-' + counter;
    h.id = slug;

    var li = document.createElement('li');
    li.className = 'toc-item';
    var a = document.createElement('a');
    a.className = 'toc-link' + (h.tagName === 'H3' ? ' level-h3' : '');
    a.href = '#' + slug;
    a.textContent = h.textContent;
    a.setAttribute('data-target', slug);
    a.addEventListener('click', function(e) {
      e.preventDefault();
      var target = document.getElementById(slug);
      if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
      var panel = document.getElementById('toc-mobile-panel');
      if (panel) panel.classList.remove('show');
    });
    li.appendChild(a);
    tocList.appendChild(li);

    if (tocMobileList) {
      var li2 = li.cloneNode(true);
      li2.querySelector('a').addEventListener('click', function(e) {
        e.preventDefault();
        var target = document.getElementById(slug);
        if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
        document.getElementById('toc-mobile-panel').classList.remove('show');
      });
      tocMobileList.appendChild(li2);
    }
  });

  var allTocLinks = document.querySelectorAll('.toc-link');
  var allHeadings = content.querySelectorAll('h2, h3');
  function updateActiveToc() {
    var scrollTop = window.scrollY || document.documentElement.scrollTop;
    var currentId = '';
    allHeadings.forEach(function(h) {
      if (h.offsetTop - 80 <= scrollTop) currentId = h.id;
    });
    allTocLinks.forEach(function(link) {
      link.classList.toggle('active', link.getAttribute('data-target') === currentId);
    });
  }
  var ticking = false;
  window.addEventListener('scroll', function() {
    if (!ticking) {
      window.requestAnimationFrame(function() { updateActiveToc(); ticking = false; });
      ticking = true;
    }
  });
  updateActiveToc();
})();

// Full-width toggle
(function() {
  var wrapper = document.querySelector('.article-page') || document.querySelector('.content-wrapper');
  var toggle = document.getElementById('full-width-toggle');
  if (!wrapper || !toggle) return;
  if (localStorage.getItem('article-full-width') === 'true') {
    wrapper.classList.add('full-width');
  }
  toggle.addEventListener('click', function() {
    wrapper.classList.toggle('full-width');
    localStorage.setItem('article-full-width', wrapper.classList.contains('full-width'));
  });
})();
</script>
