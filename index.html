<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SRE Notes — Cloud Native Tech Notes</title>
  <meta name="description" content="一位 SRE 工程师的云原生、分布式系统、Kubernetes 与可观测性实战笔记。">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/doc.css">
  <link rel="stylesheet" href="css/content.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" data-sidebar></aside>
    <div class="sidebar-backdrop" data-sidebar-backdrop></div>

    <main class="main">
      <header class="topbar">
        <button class="sidebar-toggle-mobile" data-sidebar-toggle aria-label="Open menu">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <div class="topbar-breadcrumb">
          <span class="prompt">~</span>
          <span class="sep">/</span>
          <span class="current">home</span>
        </div>
        <div class="topbar-actions">
          <button class="topbar-btn" data-palette-open aria-label="Search articles">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          </button>
          <button class="topbar-btn" data-theme-toggle aria-label="Toggle theme">
            <svg data-theme-icon="dark" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            <svg data-theme-icon="light" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
          </button>
          <a class="topbar-btn" href="https://github.com/pro12221" target="_blank" rel="noopener" aria-label="GitHub">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>
          </a>
        </div>
      </header>

      <div class="content-scroll" data-content-scroll>
        <div class="page">

          <section class="home-hero">
            <div class="label"><span class="pulse"></span><span>Cloud Native · SRE</span></div>
            <h1>Notes from the <span class="accent">trenches</span></h1>
            <p>云原生基础设施 · 分布式系统 · Kubernetes · 可观测性 — 一位 SRE 工程师的实战笔记与思考沉淀。</p>
            <div class="hero-search">
              <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
              <input type="text" placeholder="搜索 38 篇笔记..." data-palette-open readonly>
              <span class="search-shortcut">⌘K</span>
            </div>
            <div class="hero-stats" id="hero-stats"></div>
          </section>

          <section class="home-section">
            <div class="home-section-header">
              <h2>最近更新</h2>
              <a class="more" href="#recent">查看全部 →</a>
            </div>
            <div class="recent-list" id="recent-list"></div>
          </section>

          <section class="home-section">
            <div class="home-section-header">
              <h2>分类导航</h2>
            </div>
            <div class="category-grid" id="category-grid"></div>
          </section>

          <section class="home-section">
            <div class="home-section-header">
              <h2>精选文章</h2>
            </div>
            <div class="related-grid" id="featured-grid"></div>
          </section>

          <footer style="margin-top: 80px; padding: 24px 0; border-top: 1px solid var(--border); text-align: center; font-size: 12px; color: var(--text-tertiary); font-family: var(--font-mono);">
            <div>© 2026 SRE Notes · Built with HTML &amp; CSS · Deployed on Cloudflare Pages</div>
          </footer>

        </div>
      </div>
    </main>
  </div>

  <script src="js/data.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/sidebar.js"></script>
  <script src="js/palette.js"></script>
  <script src="js/home.js"></script>
  <script>
    // Mobile sidebar toggle
    document.addEventListener('click', function(e) {
      if (e.target.closest('[data-sidebar-toggle]')) {
        document.querySelector('.sidebar').classList.toggle('open');
        var bd = document.querySelector('[data-sidebar-backdrop]');
        if (bd) bd.classList.toggle('open');
      }
      if (e.target.closest('[data-sidebar-backdrop]')) {
        document.querySelector('.sidebar').classList.remove('open');
        e.target.classList.remove('open');
      }
    });
  </script>
</body>
</html>
